# Lone OS — Production (app only, Supabase runs separately)
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_SUPABASE_URL: https://painel.lonemidia.com/supabase
        NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
        NEXT_PUBLIC_META_APP_ID: ${NEXT_PUBLIC_META_APP_ID}
        NEXT_PUBLIC_PORTAL_DOMAIN: https://resultados.lonemidia.com
        NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
        SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
        SENTRY_ORG: ${SENTRY_ORG}
        SENTRY_PROJECT: lone-os-portal
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SUPABASE_URL: https://painel.lonemidia.com/supabase
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      SUPABASE_INTERNAL_URL: http://supabase-kong-1:8000
      NEXT_PUBLIC_META_APP_ID: ${NEXT_PUBLIC_META_APP_ID}
      META_APP_SECRET: ${META_APP_SECRET}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      RESEND_API_KEY: ${RESEND_API_KEY}
      EMAIL_FROM: ${EMAIL_FROM}
      # AES-256 key pra vault de senhas de cliente (base64 32 bytes).
      # Gere uma e guarde BACKUP — perder essa chave = perder acesso às senhas armazenadas.
      VAULT_KEY: ${VAULT_KEY}
      CRON_SECRET: ${CRON_SECRET}
      # Evolution API (WhatsApp) — alertas de saldo p/ grupo do gestor de tráfego
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
      EVOLUTION_INSTANCE: ${EVOLUTION_INSTANCE}
      # Agente CS (inbound). Webhook valida CS_INBOUND_SECRET. CS_LONE_TEAM_JIDS = números da
      # equipe (nunca viram demanda). CS_PILOT_GROUP_JIDS = allowlist do piloto (LGPD): vazio = todos.
      CS_INBOUND_SECRET: ${CS_INBOUND_SECRET}
      CS_LONE_TEAM_JIDS: ${CS_LONE_TEAM_JIDS}
      CS_PILOT_GROUP_JIDS: ${CS_PILOT_GROUP_JIDS}
      # Cliente alvo dos cards de TESTE quando o grupo do piloto não mapeia cliente real.
      CS_TEST_CLIENT_ID: ${CS_TEST_CLIENT_ID}
      # Grupo interno onde o agente posta as sugestões e recebe "ok/nao <código>".
      CS_INTERNAL_GROUP_JID: ${CS_INTERNAL_GROUP_JID}
      # browserless (headless chrome) p/ renderizar o PDF do relatório semanal
      BROWSERLESS_TOKEN: ${BROWSERLESS_TOKEN}
      BROWSERLESS_URL: http://chromium:3000
      SENTRY_DSN: ${SENTRY_DSN}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN}
      SENTRY_ORG: ${SENTRY_ORG}
      NEXT_PUBLIC_PORTAL_DOMAIN: https://resultados.lonemidia.com
    networks:
      - default
      - supabase_default

  # Headless chrome isolado — renderiza o PDF do relatório semanal.
  # Sem porta pública; o app alcança via http://chromium:3000 na rede interna.
  chromium:
    image: ghcr.io/browserless/chromium:latest
    restart: always
    environment:
      TOKEN: ${BROWSERLESS_TOKEN}
      CONCURRENT: "1"
      TIMEOUT: "60000"
    mem_limit: 1500m
    networks:
      - default

networks:
  default:
  supabase_default:
    external: true
